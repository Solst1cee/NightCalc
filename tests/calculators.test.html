<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>NightCalc — calculator tests</title>
  </head>
  <body>
    <!-- Hidden skeleton so app.js bootstraps without throwing: it queries these
         elements on load and calls render() at the bottom of the file. -->
    <div id="layout" hidden>
      <input id="toolSearch" />
      <div id="sessionChip"></div>
      <div id="tools"></div>
      <div id="calculator"></div>
      <button id="themeToggleButton"></button>
      <div id="accentPicker"></div>
    </div>

    <h1>NightCalc calculator tests</h1>
    <pre id="out"></pre>

    <!-- Classic script: app.js top-level functions become global (window.*). -->
    <script src="../app.js?test"></script>
    <script>
      (function () {
        const out = document.querySelector("#out");
        let pass = 0,
          fail = 0;
        function log(line) {
          out.textContent += line + "\n";
        }
        function ok(name) {
          pass++;
          log("PASS  " + name);
        }
        function bad(name, msg) {
          fail++;
          log("FAIL  " + name + " — " + msg);
        }
        function assertClose(name, actual, expected, tol) {
          tol = tol == null ? 0.01 : tol;
          if (typeof actual !== "number" || Number.isNaN(actual)) return bad(name, "got " + actual);
          return Math.abs(actual - expected) <= tol ? ok(name) : bad(name, "expected " + expected + " ± " + tol + ", got " + actual);
        }
        function assertEqual(name, actual, expected) {
          return actual === expected ? ok(name) : bad(name, "expected " + JSON.stringify(expected) + ", got " + JSON.stringify(actual));
        }

        try {
          // --- existing function: proves the harness works ---
          assertClose("CrCl 60M 70kg SCr1.0", calculateCrCl({ age: 60, sex: "male", weightKg: 70, serumCreatinine: 1.0, serumCreatinineUnit: "mgDl" }), 77.78, 0.1);

          // --- CKD-EPI 2021 eGFR (race-free), mL/min/1.73 m^2 ---
          assertClose("eGFR 60M SCr1.0", calculateEgfrCkdEpi2021({ age: 60, sex: "male", serumCreatinine: 1.0, serumCreatinineUnit: "mgDl" }), 86.2, 0.5);
          assertClose("eGFR 50F SCr0.8", calculateEgfrCkdEpi2021({ age: 50, sex: "female", serumCreatinine: 0.8, serumCreatinineUnit: "mgDl" }), 89.7, 0.5);
          assertClose("eGFR µmol/L conversion", calculateEgfrCkdEpi2021({ age: 60, sex: "male", serumCreatinine: 88.4, serumCreatinineUnit: "umolL" }), 86.2, 0.5);

          // --- Anion gap (mEq/L), optional albumin (g/dL) correction ---
          var ag = calcAnionGap({ sodium: 140, chloride: 104, bicarbonate: 24 });
          assertClose("AG basic", ag.anionGap, 12, 1e-6);
          assertEqual("AG corrected null without albumin", ag.correctedAnionGap, null);
          var agc = calcAnionGap({ sodium: 140, chloride: 104, bicarbonate: 24, albumin: 2 });
          assertClose("AG corrected with albumin 2", agc.correctedAnionGap, 17, 1e-6);
          var agHi = calcAnionGap({ sodium: 140, chloride: 104, bicarbonate: 24, albumin: 5 });
          assertClose("AG corrected with albumin 5 (above 4 subtracts)", agHi.correctedAnionGap, 9.5, 1e-6);

          // --- Albumin-corrected calcium (Ca mg/dL, albumin g/dL) ---
          assertClose("Corrected Ca 8.0/alb2", calcCorrectedCalcium({ calcium: 8.0, albumin: 2 }), 9.6, 1e-6);
          assertClose("Corrected Ca 9.0/alb3 (coefficient-sensitive)", calcCorrectedCalcium({ calcium: 9.0, albumin: 3 }), 9.8, 1e-6);

          // --- Hyperglycemia-corrected sodium (Na mEq/L, glucose mg/dL) ---
          var cna = calcCorrectedSodium({ sodium: 130, glucose: 600 });
          assertClose("Corrected Na factor 1.6", cna.corrected16, 138, 1e-6);
          assertClose("Corrected Na factor 2.4", cna.corrected24, 142, 1e-6);
          var cnaLo = calcCorrectedSodium({ sodium: 140, glucose: 80 });
          assertClose("Corrected Na low glucose 1.6", cnaLo.corrected16, 139.68, 1e-6);
          assertClose("Corrected Na low glucose 2.4", cnaLo.corrected24, 139.52, 1e-6);

          // --- Scoring engine: qSOFA (3 binary, 0-3) ---
          assertClose("qSOFA all yes", calcScore(SCORES.qsofa, { rr: "y", sbp: "y", ams: "y" }), 3, 1e-9);
          assertClose("qSOFA RR+AMS", calcScore(SCORES.qsofa, { rr: "y", sbp: "n", ams: "y" }), 2, 1e-9);
          assertClose("qSOFA none", calcScore(SCORES.qsofa, { rr: "n", sbp: "n", ams: "n" }), 0, 1e-9);

          // --- QTc (QT ms, HR bpm); RR = 60/HR seconds ---
          var qtc = calcQtc({ qtMs: 400, hrBpm: 75 });
          assertClose("QTc Bazett 400/75", qtc.bazett, 447.2, 0.2);
          assertClose("QTc Fridericia 400/75", qtc.fridericia, 430.9, 0.2);
          assertClose("QTc Bazett 400/60 = 400", calcQtc({ qtMs: 400, hrBpm: 60 }).bazett, 400, 1e-6);

          // --- Ideal/Adjusted body weight (Devine); height cm, weight kg ---
          var bw = calcBodyWeight({ heightCm: 175, sex: "male", weightKg: 90 });
          assertClose("IBW 175cm male", bw.ibw, 70.47, 0.05);
          assertClose("AdjBW 175cm male 90kg", bw.adjusted, 78.28, 0.05);
          assertClose("IBW 160cm female", calcBodyWeight({ heightCm: 160, sex: "female" }).ibw, 52.38, 0.05);

          // --- Scores: CURB-65, CHA2DS2-VASc, GCS ---
          assertClose("CURB-65 conf+urea+age", calcScore(SCORES.curb65, { confusion: "y", urea: "y", rr: "n", bp: "n", age65: "y" }), 3, 1e-9);
          assertClose("CHA2DS2-VASc age65+F+HTN", calcScore(SCORES.chadsvasc, { age: "1", sex: "f", chf: "n", htn: "y", dm: "n", stroke: "n", vasc: "n" }), 3, 1e-9);
          assertClose("CHA2DS2-VASc age75+stroke", calcScore(SCORES.chadsvasc, { age: "2", sex: "m", chf: "n", htn: "n", dm: "n", stroke: "y", vasc: "n" }), 4, 1e-9);
          assertClose("GCS E2V4M5 = 11", calcScore(SCORES.gcs, { eye: "2", verbal: "4", motor: "5" }), 11, 1e-9);
          assertClose("GCS best = 15", calcScore(SCORES.gcs, { eye: "4", verbal: "5", motor: "6" }), 15, 1e-9);

          // --- NEWS2 (numericBand) + CIWA-Ar ---
          // RR22(2)+SpO2 93(2)+suppO2 y(2)+temp38.5(1)+SBP100(2)+HR48(1)+Alert(0) = 10
          assertClose("NEWS2 worked example = 10", calcScore(SCORES.news2, { rr: 22, spo2: 93, suppO2: "y", temp: 38.5, sbp: 100, hr: 48, consciousness: "a" }), 10, 1e-9);
          assertClose("NEWS2 all-normal = 0", calcScore(SCORES.news2, { rr: 16, spo2: 98, suppO2: "n", temp: 37, sbp: 120, hr: 70, consciousness: "a" }), 0, 1e-9);
          assertClose("CIWA-Ar 4+3+2 = 9", calcScore(SCORES.ciwa, { nausea: "4", tremor: "3", sweats: "0", anxiety: "0", agitation: "0", tactile: "0", auditory: "0", visual: "0", headache: "0", orientation: "2" }), 9, 1e-9);

          // --- Child-Pugh + Wells (PE) ---
          assertClose("Child-Pugh B example = 7", calcScore(SCORES.childpugh, { bilirubin: "2", albumin: "1", inr: "1", ascites: "2", enceph: "1" }), 7, 1e-9);
          assertClose("Wells-PE DVT+PE+HR = 7.5", calcScore(SCORES.wellspe, { dvt: "y", peLikely: "y", hr: "y", immob: "n", priorVte: "n", hemoptysis: "n", malignancy: "n" }), 7.5, 1e-9);
          assertClose("Wells-PE HR+prior+hemoptysis = 4", calcScore(SCORES.wellspe, { dvt: "n", peLikely: "n", hr: "y", immob: "n", priorVte: "y", hemoptysis: "y", malignancy: "n" }), 4, 1e-9);
          // --- Adrogué–Madias: ΔNa per 1 L = (infusateNa - serumNa)/(TBW+1) ; TBW = wt*frac ---
          assertClose("Adrogue 70M Na120 3%saline", calcAdrogue({ weightKg: 70, sex: "male", sodium: 120, infusateNa: 513 }), 9.14, 0.01);
          assertClose("Adrogue 60F Na122 NS", calcAdrogue({ weightKg: 60, sex: "female", sodium: 122, infusateNa: 154 }), 1.032, 0.01);
          // --- A–a gradient: PAO2 = FiO2*(760-47) - PaCO2/0.8 ; A-a = PAO2 - PaO2 ; expected = 2.5 + 0.21*age ---
          var aa1 = calcAaGradient({ fio2: 0.21, paco2: 40, pao2: 95, age: 40 });
          assertClose("A-a gradient young", aa1.gradient, 4.73, 0.05);
          assertClose("A-a expected age40", aa1.expected, 10.9, 1e-6);
          assertClose("A-a gradient elevated", calcAaGradient({ fio2: 0.21, paco2: 30, pao2: 60, age: 70 }).gradient, 52.23, 0.05);
          // --- Osmolality: 2*Na + glu/18 + BUN/2.8 (+ EtOH/3.7) ; gap = measured - calc ---
          assertClose("Osm calc no EtOH", calcOsmolality({ sodium: 140, glucose: 90, bun: 14 }).calculated, 290, 1e-6);
          assertClose("Osm calc with EtOH", calcOsmolality({ sodium: 135, glucose: 180, bun: 28, ethanol: 100 }).calculated, 317.027, 0.01);
          assertClose("Osm gap", calcOsmolality({ sodium: 140, glucose: 90, bun: 14, measured: 290 }).gap, 0, 1e-6);
          // --- Free water deficit: TBW*(Na/140 - 1); TBW = wt*frac (0.6 M / 0.5 F / 0.5 elderly M / 0.45 elderly F) ---
          assertClose("FWD 70kg M Na160", calcFreeWaterDeficit({ weightKg: 70, sex: "male", sodium: 160 }), 6.0, 0.01);
          assertClose("FWD 60kg elderly F Na154", calcFreeWaterDeficit({ weightKg: 60, sex: "female", sodium: 154, elderly: true }), 2.7, 0.01);
          // --- MAP = (SBP + 2*DBP)/3 ---
          assertClose("MAP 120/80", calcMap({ sbp: 120, dbp: 80 }), 93.333, 0.01);
          assertClose("MAP 90/60", calcMap({ sbp: 90, dbp: 60 }), 70, 1e-6);
          // --- Winter's: expected PaCO2 = 1.5*HCO3 + 8 (±2) ---
          assertClose("Winters HCO3 12", calcWinters({ bicarbonate: 12 }).expected, 26, 1e-6);
          assertClose("Winters HCO3 8 low", calcWinters({ bicarbonate: 8 }).low, 18, 1e-6);
          // --- MELD-Na ---
          assertEqual("MELD-Na Cr2 bili3 INR1.5 Na130", calcMeld({ creatinine: 2.0, bilirubin: 3.0, inr: 1.5, sodium: 130, albumin: 3.0, sex: "male" }).meldNa, 26);
          assertEqual("MELD-Na all-1 Na120 floors to 6", calcMeld({ creatinine: 1.0, bilirubin: 1.0, inr: 1.0, sodium: 120, albumin: 3.5, sex: "male" }).meldNa, 6);
          // --- MELD 3.0 ---
          assertEqual("MELD3 male Cr2 bili3 INR1.5 Na130 alb3.0", calcMeld({ creatinine: 2.0, bilirubin: 3.0, inr: 1.5, sodium: 130, albumin: 3.0, sex: "male" }).meld3, 27);
          assertEqual("MELD3 female Cr1 bili2 INR1.2 Na135 alb2.5", calcMeld({ creatinine: 1.0, bilirubin: 2.0, inr: 1.2, sodium: 135, albumin: 2.5, sex: "female" }).meld3, 15);
        } catch (err) {
          bad("suite", err && err.message ? err.message : String(err));
        }

        log("\n" + pass + " passed, " + fail + " failed");
        console.log(out.textContent);
        document.title = (fail ? "FAIL " : "PASS ") + pass + "/" + (pass + fail);
      })();
    </script>
  </body>
</html>
